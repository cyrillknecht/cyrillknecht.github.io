<section id="skills" class="section skills-section">
  <div class="container">
    <h2 class="section-title" data-aos="fade-up">Skills</h2>
    <div class="skills-grid">
      @for (group of skillGroups; track group.category; let i = $index) {
        <div class="skill-group" data-aos="fade-up" [attr.data-aos-delay]="i * 100">
          <div class="skill-group-header">
            <span class="skill-icon">{{ group.icon }}</span>
            <h3 class="skill-group-title">{{ group.category }}</h3>
          </div>
          <div class="skill-badges">
            @for (skill of group.skills; track skill; let j = $index) {
              <span class="skill-badge" [style.animation-delay]="(j * 60) + 'ms'">{{ skill }}</span>
            }
          </div>
        </div>
      }
    </div>
  </div>
</section>
